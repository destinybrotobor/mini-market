<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="../assets/fa/css/all.min.css" />
    <title>
        Jumia Nigeria | Online Shopping for Electronics, Fashion, Home, Beauty &
        Sport
    </title>
</head>

<body>
    <!--========== HEADER SECTION STARTS HERE ========== -->
    <header class="hidden lg:block md:block">
        <aside class="bg-[#F5A9B2]">
            <img src="../assets/images/jumai-gif.gif" class="m-auto" />
        </aside>
        <aside class="bg-[#F1F1F2]">
            <div class="max-w-7xl px-15 flex items-center justify-around">
                <div class="">
                    <div class="flex justify-center items-center">
                        <div><img src="../assets/images/jumia.svg" class="w-5" /></div>
                        <div>
                            <a href="#" class="text-[#F68B1E] hover:underline">sell on jumai</a>
                        </div>
                    </div>
                </div>
                <div class="flex items-center justify-center m-auto gap-5">
                    <div><img src="../assets/images/Jumia-Logo.png" class="w-20" /></div>
                    <div><i class="fa-brands fa-amazon-pay text-[20px]"></i></div>
                    <div><i class="fa-brands fa-hooli text-[20px]"></i></div>
                </div>
            </div>
        </aside>
    </header>
    <nav class="bg-[#ffffff] sticky top-0 z-10 pb-3 lg:pb-0">
        <!--========== DESKTOP VERSION ==========-->
        <div class="flex justify-around items-center max-w-7xl mx-auto">
            <div>
                <img src="../assets/images/Jumia-Logo.png" class="w-30 lg:w-40" />
            </div>
            <div>
                <form class="hidden lg:flex md:flex gap-2 lg:w-180 md:w-120">
                    <div class="flex-1 flex items-center h-12 px-4 w-full grow border border-gray-400 rounded-[5px]">
                        <i class="fa-solid fa-magnifying-glass text-gray-500 mx-2"></i>
                        <input type="text" placeholder="Search products, brands and categories"
                            class="outline-none w-full" />
                    </div>
                    <button type="submit"
                        class="h-12 px-4 bg-orange-500 text-white shadow-gray-300 shadow-md rounded-[5px] hover:shadow-xl hover:-translate-y-0.5 duration-200 transition-all">
                        Search
                    </button>
                </form>
            </div>
            <div class="flex gap-7">
                <div class="hover:text-orange-500 cursor-pointer transition-all ease-in-out duration-200">
                    <i class="fa-solid fa-user text-[21px] mr-1"></i>
                    <a href="#" class="hidden lg:inline-block md:inline-block">Account<i
                            class="fa-solid fa-angle-down text-[10px] align-super"></i></a>
                </div>
                <div
                    class="hover:text-orange-500 cursor-pointer transition-all ease-in-out duration-200 hidden lg:inline-block md:inline-block">
                    <i class="fa-regular fa-circle-question text-[21px] mr-1"></i>
                    <a href="#" class="">Help<i class="fa-solid fa-angle-down text-[10px] align-super"></i></a>
                </div>
                <div class="hover:text-orange-500 cursor-pointer transition-all ease-in-out duration-200">
                    <i class="fa-solid fa-cart-shopping text-[21px] mr-1"></i>
                    <a href="#" class="hidden lg:inline-block md:inline-block">Cart</a>
                </div>
            </div>
        </div>
        <!--========== MOBILE VERSION ==========-->
        <form class="gap-2 w-95 m-auto lg:hidden md:hidden">
            <div class="flex-1 flex items-center h-12 px-4 w-full grow border border-gray-400 rounded-[5px]">
                <i class="fa-solid fa-magnifying-glass text-gray-500 mx-2"></i>
                <input type="text" placeholder="Search products, brands and categories" class="outline-none w-full" />
            </div>
        </form>
    </nav>
    <!--========== HEADER SECTION ENDS HERE ========== -->


    <!--=========== FLASH SALES SECTION STARTS HERE ===========-->
    <section class="bg-[#F1F1F2]" id="flash-sales-section">

    </section>
    <script>
        fetch('components/flash-sales.html')
            .then((response) => response.text())
            .then((htmlData) => {
                document.getElementById('flash-sales-section').innerHTML = htmlData;
            })
    </script>
    <!--=========== FLASH SALES SECTION  ENDS HERE ===========-->

    <script src="../assets/js/display-products.js"></script>
</body>


</html>
