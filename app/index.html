<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="../assets/fa/css/all.min.css" />
    <title>
        Jumia Nigeria | Online Shopping for Electronics, Fashion, Home, Beauty &
        Sport
    </title>
</head>

<body>
    <section id="header-section"></section>


    <!--=========== FLASH SALES SECTION STARTS HERE ===========-->
    <section class="bg-[#F1F1F2]" id="flash-sales-section">

    </section>
    <script>
        fetch('components/flash-sales.html')
            .then((response) => response.text())
            .then((htmlData) => {
                document.getElementById('flash-sales-section').innerHTML = htmlData;
            })
    </script>
    <!--=========== FLASH SALES SECTION  ENDS HERE ===========-->


    <!-- ========= CATEGORIES SECTION STARTS HERE ========= -->
    <section class="max-w-8xl m-auto px-15 py-10" id="categories-section">
        <div id="categories-container"
            class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 max-w-7xl mx-auto bg-white min-h-12 px-4 py-6 gap-4">
            <!-- Category items will be dynamically inserted here -->
        </div>
    </section>
    <!-- ========= CATEGORIES SECTION ENDS HERE ========= -->

    <button id="greet-button">
        Greet the Class
    </button>

    <script src="../assets/js/display-products.js"></script>
    <script src="../assets/js/global.js"></script>
    <script>
        let greet = () => {
            alert("Hello Everyone");
        }

        // document.getElementById('greet-button').addEventListener('click', () => {
        //     alert("I dey greet o...!")
        // })

        // document.getElementById('greet-button').addEventListener('click', greet);
        document.getElementById('greet-button').addEventListener('click', () => greet());
    </script>
</body>


</html>
