<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Posts</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="../assets/fa/css/all.min.css" />
</head>

<body>
    <section id="header-section"></section>

    <h1 class="text-5xl font-bold max-w-7xl mx-auto w-full px-4 my-4">
        Blog Posts
    </h1>

    <section class="max-w-7xl m-auto py-10" id="blog-section">
        <div id="blog-container"
            class="grid grid-cols-2 md:grid-cols-4 max-w-7xl mx-auto bg-white min-h-12 px-4 py-6 gap-4">
            <aside class="min-h-20 shadow-lg bg-white hover:scale-101 transition-all duration-200 rounded-lg">
                <aside
                    class="h-40 overflow-hidden flex justify-center items-center rounded-lg bg-slate-300 skeleton-shimmer">
                </aside>
                <div class="py-4 px-3">
                    <h3 class="font-bold line-clamp-2 h-4 w-full skeleton-shimmer"></h3>
                    <p class="text-sm line-clamp-1  h-2 w-full skeleton-shimmer mt-2">
                    </p>
                    <section class="flex justify-between items-center mt-2 text-xs  h-4 w-full skeleton-shimmer">
                    </section>
                </div>
            </aside>
        </div>
    </section>


    <!-- Experimenting with JSON Placeholder API: https://jsonplaceholder.typicode.com/ -->

    <script src="../assets/js/global.js"></script>

    <script>
        // Added the DOMContentLoaded Event to the document, which checks when the document is ready and all html elements are fully loaded
        document.addEventListener('DOMContentLoaded', () => {
            // Display All Post
            let displayPosts = (posts) => {
                let allPosts = '';
                posts.forEach((post, index) => {
                    allPosts += `<a href="blog-details.html?id=${post.id}" class="block min-h-20 hover:shadow-lg bg-white hover:scale-101 transition-all duration-200 rounded-lg">
                        <aside class="h-40 overflow-hidden flex justify-center items-center rounded-lg bg-slate-300">
                        </aside>
                        <div class="py-4 px-3">
                            <h3 class="font-bold line-clamp-2">${post.title}</h3>
                            <p class="text-sm line-clamp-1">${post.body}</p>
                            <section class="flex justify-between items-center mt-2 text-xs">
                                <div class="flex items-center gap-1">
                                    <figure class="bg-slate-300 h-7 w-7 rounded-full"></figure>
                                    <span class="font-semibold">${post.author.name}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span>
                                        <i class="fa-regular fa-comments text-base"></i> <span>${post.comments.length}</span>
                                    </span>
                                    <button>
                                        <i class="fa-solid fa-share-alt text-base"></i>
                                    </button>
                                </div>
                            </section>
                        </div>
                    </a>
                    `
                });


                document.getElementById('blog-container').innerHTML = allPosts;
            }

            // A function to fetch all posts
            let fetchPosts = async () => {
                let allPosts = [];
                let allUsers = [];
                let allComments = [];

                // Fetch Posts
                await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'get'
                })
                    .then((res) => res.json())
                    .then((posts) => {
                        allPosts = posts;
                    })
                    .catch((error) => {
                        if (!error.response) {
                            if (String(error).toLocaleLowerCase().includes('network')) {
                                // alert("No Network Connection! Check your network or network provider.");
                                document.getElementById('blog-container').innerHTML = "No Network Connection! Check your network or network provider.";
                            } else {
                                // alert(error || 'An unexpected error occurred');
                                document.getElementById('blog-container').innerHTML = error || 'An unexpected error occurred';
                            }
                        } else {
                            // alert(error.response.data.message || 'An unexpected error occurred while fetching data');
                            document.getElementById('blog-container').innerHTML = error.response.data.message || 'An unexpected error occurred while fetching data';
                        }
                    })

                // Fetch Users
                await fetch('https://jsonplaceholder.typicode.com/users')
                    .then((response) => response.json())
                    .then((users) => allUsers = users)


                // Fetch Comments
                await fetch('https://jsonplaceholder.typicode.com/comments')
                    .then((response) => response.json())
                    .then((comment) => allComments = comment)

                // Display all Data
                console.log("All Posts", allPosts);
                console.log("All Users", allUsers);

                // let user = allUsers.find((user) => user.id == 1);
                // console.log(user);

                allPosts.forEach((post, index) => {
                    // Find the author from all users array and attach it to the current (index) post using the property 'author'
                    let postAuthor = allUsers.find((user) => user.id == post.userId);
                    allPosts[index].author = postAuthor;

                    // filter all the comments, get the ones that belong to the current post and attach it using the property 'comments'
                    let postComments = allComments.filter((comment) => comment.postId === post.id);
                    allPosts[index].comments = postComments;
                });

                // console.log(allPosts[0]);

                displayPosts(allPosts);
            }

            fetchPosts();
        })
    </script>

</body>

</html>
