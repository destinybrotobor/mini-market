<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../assets/css/styles.css" />
<link rel="stylesheet" href="../assets/fa/css/all.min.css" />
<title>
    precious practise
</title>
</head>


<body>

<section id="container"
    style="background-color:   rgb(251, 251, 252) ;   position: none; text-align: center; grid-column: 30px; height: 300px; margin-top: 20px; display: flex; flex-wrap: wrap; gap: 3%; ">
    <nav style="background-color: brown; height: 30px;">

    </nav>
    

</section>

<script>
    let displayproducts = (productsList) => {
        let productsContainer = document.getElementById('container');
        let productsCard = '';

        productsList.forEach((products, index) => {
            productsCard += `
            <style>
        #done:hover {
            box-shadow: 0px 0px 20px;
            transform: scale(1.03);
        }
    </style>

            <div id="done"  style="background-color: yellow; width:30% ; border-radius: 13px; height:40%;  box-shadow: 0px 0px 1px;
                transition: all 0.5s;">
        <aside style="width: fit-content; height:40%; ">
            <img style=" border-radius: 10px;" src="${products.images}" alt="">
        </aside>
        <p style="">${products.name}</p>
        <p style="">${products.email}</p>
        <p style="">${products.phone}</p>

        
    </div>`
        })
        productsContainer.innerHTML = productsCard;
    }

    // Fetch the product
    fetch('../precious/my-products.json')
        .then((response) => response.json())
        .then((data) => {
            console.log(data);
            displayproducts(data.products)
        })


</script>

</body>
